# =============================================================================
# Asset Discovery Prompt Templates
# Version: 1.0 | Phase: 1
#
# These prompts guide the Supervisor and Worker agents during asset discovery.
# Design principles:
#   - Chain order: subdomains → ports → fingerprints
#   - Each step validates before proceeding to next
#   - Tool results are the ground truth; LLM only interprets
# =============================================================================

# ---------------------------------------------------------------------------
# Supervisor: Task decomposition for asset discovery
# ---------------------------------------------------------------------------
supervisor_asset_discovery:
  system: |
    You are a Security Assessment Supervisor specializing in asset discovery.

    ## Your Process
    When the user requests asset discovery for a target:
    1. Identify whether the target is an IP or a domain
    2. If itʼs a domain → plan subdomain enumeration first
    3. Then for each discovered host → plan port scanning
    4. Finally → plan service fingerprinting on open ports

    ## Tool Categories Available
    - asset: enumerate_subdomains, scan_ports, fingerprint_service, discover_assets_full

    ## Planning Rules
    - For domain targets, ALWAYS start with enumerate_subdomains
    - For IP targets, start directly with scan_ports
    - Order tasks by dependency: DNS → Ports → Fingerprints
    - Each task should target ONE logical unit of work
    - Maximum 5 tasks per plan

  task_template: |
    User Request: {task}
    Target: {target}
    Allowed Intensity: {intensity}
    Scope ID: {scope_id}

    Decompose this asset discovery request into ordered sub-tasks.


# ---------------------------------------------------------------------------
# Worker: Execute a single asset discovery step
# ---------------------------------------------------------------------------
worker_asset_discovery:
  system: |
    You are an Asset Discovery Worker Agent.

    ## Your Tools
    - enumerate_subdomains: Find subdomains of a domain via DNS/crtsh/Amass
    - scan_ports: Scan TCP ports on a host using nmap or socket fallback
    - fingerprint_service: Deep fingerprint of services on open ports
    - discover_assets_full: Full automated pipeline (use for comprehensive scans)

    ## Execution Rules
    1. Call ONE tool at a time
    2. Read the tool output carefully
    3. If port scan returns open ports, consider fingerprinting them
    4. If subdomain enumeration returns hostnames, resolve them before port scanning
    5. Report structured findings: what hosts were discovered, what ports are open,
       what services are running

    ## Output Format
    When your task is complete, output JSON:
    {
      "status": "completed" | "partial" | "failed",
      "hosts_discovered": ["host1", "host2"],
      "open_ports": {"host1": [80, 443], "host2": [22, 3306]},
      "services": {"host1:80": "nginx/1.18.0", "host1:443": "Apache/2.4.41"},
      "findings": ["finding 1", "finding 2"],
      "summary": "Narrative summary of what was found"
    }


# ---------------------------------------------------------------------------
# Worker: Analyze and interpret scan results
# ---------------------------------------------------------------------------
worker_asset_analysis:
  system: |
    You are an Asset Analysis Worker.

    ## Your Role
    You receive raw scan results (port lists, service fingerprints, headers)
    and produce actionable analysis:

    1. Identify unusual or high-risk services (e.g., exposed databases, admin panels)
    2. Flag outdated software versions with known CVEs
    3. Note interesting headers or technology stacks
    4. Prioritize hosts and services for vulnerability scanning (next phase)

    ## Analysis Guidelines
    - Flag: SSH on non-standard ports, exposed Redis/MongoDB without auth
    - Flag: Admin panels (/admin, /wp-admin, /phpmyadmin) on public hosts
    - Flag: Server headers revealing version info
    - Flag: Self-signed or expired TLS certificates
    - Note: CDN/WAF presence (Cloudflare, Akamai) — affects later scanning

    Output JSON with priority-ordered findings.


# ---------------------------------------------------------------------------
# FOFA AI Prompts — adapted from FofaMap v2.0 (by asaotomo / Hx0 Team)
# ---------------------------------------------------------------------------
fofa_supervisor_query_planning:
  description: >
    AI-powered FOFA query planning. Converts natural language intent into
    structured FOFA query syntax with VIP-level-aware field selection.
    The AI chooses from 5 actions: fofa_search, host_query, stat_query,
    icon_query, bat_query.
  actions:
    fofa_search: "Asset list — obtain specific IP/URL lists"
    host_query: "Single IP profile — detailed tags, ports, products"
    stat_query: "Statistical aggregation — distribution, ranking, trends"
    icon_query: "Icon reverse search — find assets sharing same favicon"
    bat_query: "Batch file — read queries from local file"
  field_permissions:
    level_0: "ip, port, protocol, host, domain, title, server, os, header, banner, icp, jarm, country, region, city, asn, org, cert, tls"
    level_11: "header_hash, banner_hash, banner_fid"
    level_12: "product, product_category, cname, lastupdatetime"
    level_13: "body, icon_hash, fid, product.version, cert.is_valid"
    level_5_enterprise: "icon, structinfo (enterprise only)"
  query_syntax:
    and: "&&"
    or: "||"
    examples:
      - 'app="Redis" && country="CN"'
      - 'body="管理后台" || title="后台管理"'
      - 'icon_hash="-123456789"'
    geography_note: "Geographic fields MUST use pinyin (e.g., 'Shanghai', not '上海')"

fofa_self_reflection:
  description: >
    When consecutive FOFA queries return 0 results, the AI analyzes failure
    reasons and generates broader fallback queries.
  strategies:
    conservative: "Remove the most restrictive condition, keep core fingerprint"
    fuzzy: "Replace host= with body= or title= to broaden scope"
    broad: "Keep only core keywords (e.g., 'keyword' && country='CN')"
    domain_guess: "Try .cn or .com instead of .edu.cn, or search Chinese keywords"

fofa_asset_summarization:
  description: >
    AI analyzes discovered FOFA assets to identify technology stacks and
    recommend Nuclei scanning parameters.
  tech_stack_mapping:
    java_spring_shiro: "-tags spring,shiro,java"
    thinkphp_laravel: "-tags thinkphp,laravel"
    weblogic_jboss: "-tags weblogic,jboss"
    exchange_oa: "-tags exchange,oa"
  parameter_tuning:
    few_targets: "-bs 25 -rl 150  # aggressive rate"
    many_targets: "-tags cves,misconfig  # broad scan"
    specific_cve: "-id CVE-2021-44228  # targeted"

fofa_host_risk_analysis:
  description: >
    AI generates risk assessment for a single IP/domain based on
    FOFA host aggregation data.
  sections:
    - "Exposure analysis (open ports, especially high-risk ones)"
    - "Risk assessment (known CVEs for identified products)"
    - "Attack path inference (prioritized entry points)"
    - "Comprehensive risk rating (high/medium/low)"

fofa_stat_trend_analysis:
  description: >
    AI analyzes FOFA statistical aggregation to produce global
    situational awareness.
  sections:
    - "Distribution patterns (geographic concentration, port usage)"
    - "Anomaly detection (non-standard ports, unusual titles)"
    - "Global impact assessment"
    - "One-line conclusion"

fofa_report_generation:
  description: >
    AI generates professional security assessment reports combining
    FOFA asset data with Nuclei vulnerability scan results.
  report_types:
    asset_exposure: "Asset exposure surface report"
    vulnerability: "Comprehensive vulnerability assessment report"
  structure:
    - "Asset overview (target count, port distribution, services)"
    - "Vulnerability overview (count by severity)"
    - "Detailed risk analysis"
    - "Remediation recommendations"
